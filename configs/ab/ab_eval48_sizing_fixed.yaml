# 改进轮 5(2026-06-13):sizing vol_target(生产默认)vs fixed。48 股池,
# 策略 = 生产默认(两臂相同),仅 backtest.sizing 不同。
# 动机:v2 重跑的 sizing 组(16 股/旧因子)fixed 同时赢 sharpe(0.623 vs
# 0.567,11:5)和 return(66.9% vs 47.8%,12:4),旧结论"保持 vol_target"
# 与"return+sharpe 优先"的目标不符 —— 在生产口径 48 股池上正面复测。
base_config: ../../config_eval48.yaml
arms:
  voltarget_base:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: &id001
          type: lasso
          lasso:
            alpha: 0.001
            max_iter: 1000
            tol: 1.0e-06
        weighter: &id002
          type: ic
          ic:
            use_rank: true
            min_abs_ic: 0.0
          ir:
            n_chunks: 6
            use_rank: true
            min_abs_ir: 0.0
        thresholds: &id003
          strong_buy: 0.9
          buy: 0.7
          sell: 0.3
          strong_sell: 0.1
        buy_verdicts: &id004
        - buy
        - strong_buy
        sell_verdicts: &id005
        - sell
        - strong_sell
        refresh_verdicts: &id006
        - strong_buy
        mask:
          enabled: false
        preprocess: &id007
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
    backtest:
      equity_curve_holding_days:
      - 10
      sizing:
        type: vol_target
        fixed:
          size: 0.1
        vol_target:
          reference_vol_annual: 0.30
          vol_window: 20

  fixed:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: *id001
        weighter: *id002
        thresholds: *id003
        buy_verdicts: *id004
        sell_verdicts: *id005
        refresh_verdicts: *id006
        mask:
          enabled: false
        preprocess: *id007
    backtest:
      equity_curve_holding_days:
      - 10
      sizing:
        type: fixed
        fixed:
          size: 0.1
        vol_target:
          reference_vol_annual: 0.30
          vol_window: 20
