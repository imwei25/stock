# Smoke A/B for symmetric (Löwdin) orthogonalization.
# Confirms the module runs end-to-end on a WIDE cross-section and gives a first
# directional read. Both arms run training_universe=all (~4357 stocks) so
# n_codes >> min_pool_size and the orthogonalization step actually executes;
# stocks_filter keeps the backtest set small (3 stocks) for speed.
#   arm base:  current production-default preprocess, orthogonalize OFF
#   arm ortho: same + symmetric_orthogonalize ON
base_config: ../../config.yaml
stocks_filter:
  - "605589"
  - "603986"
  - "000528"
arms:
  base:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: &id001
          type: lasso
          lasso: {alpha: 0.001, max_iter: 1000, tol: 1.0e-06}
        weighter: &id002
          type: ic
          ic: {use_rank: true, min_abs_ic: 0.0}
          ir: {n_chunks: 6, use_rank: true, min_abs_ir: 0.0}
        thresholds: &id003 {strong_buy: 0.9, buy: 0.7, sell: 0.3, strong_sell: 0.1}
        buy_verdicts: &id004 [buy, strong_buy]
        sell_verdicts: &id005 [sell, strong_sell]
        refresh_verdicts: &id006 [strong_buy]
        mask: {enabled: false}
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
          symmetric_orthogonalize: false
    backtest:
      equity_curve_holding_days: [10]
  ortho:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: *id001
        weighter: *id002
        thresholds: *id003
        buy_verdicts: *id004
        sell_verdicts: *id005
        refresh_verdicts: *id006
        mask: {enabled: false}
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
          symmetric_orthogonalize: true
    backtest:
      equity_curve_holding_days: [10]
