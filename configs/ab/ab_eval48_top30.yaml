# 改进轮 6-G2(2026-06-13):因子 top-20(生产)vs top-30。48 股池,fixed sizing
# 基线,其余生产默认。动机:同口径 pick-by-ic 放宽到 30 个(新增 alpha_018/
# 027/006/072/036/077/032、mom_vol_interact_10、hl_range_20、corr_high_low_20),
# Lasso 在更宽候选上自行稀疏;代价是弱因子稀释 + 面板成本。
base_config: ../../config_eval48.yaml
arms:
  top20_base:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: &id001
          type: lasso
          lasso:
            alpha: 0.001
            max_iter: 1000
            tol: 1.0e-06
        weighter: &id002
          type: ic
          ic:
            use_rank: true
            min_abs_ic: 0.0
          ir:
            n_chunks: 6
            use_rank: true
            min_abs_ir: 0.0
        thresholds: &id003
          strong_buy: 0.9
          buy: 0.7
          sell: 0.3
          strong_sell: 0.1
        buy_verdicts: &id004
        - buy
        - strong_buy
        sell_verdicts: &id005
        - sell
        - strong_sell
        refresh_verdicts: &id006
        - strong_buy
        mask:
          enabled: false
        preprocess: &id007
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
    backtest:
      equity_curve_holding_days:
      - 10

  top30:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection_top30.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: *id001
        weighter: *id002
        thresholds: *id003
        buy_verdicts: *id004
        sell_verdicts: *id005
        refresh_verdicts: *id006
        mask:
          enabled: false
        preprocess: *id007
    backtest:
      equity_curve_holding_days:
      - 10
