# Phase 2 A/B: which ④-neutralization step helps, on top of the validated
# winsorize + cs_zscore base (P4-1b PASS)?
#   arm A (industry):   + industry_neutralize  (per-day within-industry demean)
#   arm B (market_cap):  + market_cap_neutralize (per-day OLS residual on log mcap)
# Both run training_universe=all (~4357 stocks) so the cross-section is wide
# enough for stable neutralization (Phase 1.5 lesson). mcap from baostock
# profit.totalShare × close (data/fundamentals_profit.parquet).
base_config: ../../config.yaml
arms:
  industry:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: &id001
          type: lasso
          lasso:
            alpha: 0.001
            max_iter: 1000
            tol: 1.0e-06
        weighter: &id002
          type: ic
          ic:
            use_rank: true
            min_abs_ic: 0.0
          ir:
            n_chunks: 6
            use_rank: true
            min_abs_ir: 0.0
        thresholds: &id003
          strong_buy: 0.9
          buy: 0.7
          sell: 0.3
          strong_sell: 0.1
        buy_verdicts: &id004
        - buy
        - strong_buy
        sell_verdicts: &id005
        - sell
        - strong_sell
        refresh_verdicts: &id006
        - strong_buy
        mask:
          enabled: false
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: true
          market_cap_neutralize: false
    backtest:
      equity_curve_holding_days:
      - 10

  market_cap:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: *id001
        weighter: *id002
        thresholds: *id003
        buy_verdicts: *id004
        sell_verdicts: *id005
        refresh_verdicts: *id006
        mask:
          enabled: false
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
    backtest:
      equity_curve_holding_days:
      - 10
