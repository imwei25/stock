# 改进轮 1(2026-06-13):v1(inf 中毒面板上选出)vs v2(干净面板重选)因子清单。
# 两臂除 factors_file 外与生产默认完全一致(winsorize+zscore+mcap,lasso+ic,
# pooled,training_universe=all)。评估池 48 只(config_eval48.yaml)。
# selection_v2.json 由 factors analyze(v2 面板,--end-date 2024-05-20)+
# pick-by-ic(top20, max-corr 0.6, min-ir 0.05)产出 —— 与 v1 同参数同窗口。
base_config: ../../config_eval48.yaml
arms:
  selection_v1:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: &id001
          type: lasso
          lasso:
            alpha: 0.001
            max_iter: 1000
            tol: 1.0e-06
        weighter: &id002
          type: ic
          ic:
            use_rank: true
            min_abs_ic: 0.0
          ir:
            n_chunks: 6
            use_rank: true
            min_abs_ir: 0.0
        thresholds: &id003
          strong_buy: 0.9
          buy: 0.7
          sell: 0.3
          strong_sell: 0.1
        buy_verdicts: &id004
        - buy
        - strong_buy
        sell_verdicts: &id005
        - sell
        - strong_sell
        refresh_verdicts: &id006
        - strong_buy
        mask:
          enabled: false
        preprocess: &id007
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
          market_cap_neutralize: true
    backtest:
      equity_curve_holding_days:
      - 10

  selection_v2:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection_v2.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector: *id001
        weighter: *id002
        thresholds: *id003
        buy_verdicts: *id004
        sell_verdicts: *id005
        refresh_verdicts: *id006
        mask:
          enabled: false
        preprocess: *id007
    backtest:
      equity_curve_holding_days:
      - 10
