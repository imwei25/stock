# Loop direction F1: tradability mask off vs on (limit/suspension only).
# min_listing_days=0 avoids the listing-mask heuristic (ipo_dates.parquet missing).
# Mask only affects training labels -> score recompute for the on-arm.
# Run: .venv/Scripts/python.exe -m stockpool portfolio-ab --config docs/improvement_loop/configs/F1.yaml
base_config: ../../../config.yaml
use_ab_pool: true

arms:
  mask_off:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector:
          type: lasso
          lasso: {alpha: 0.001, max_iter: 1000, tol: 1.0e-6}
        weighter:
          type: ic
          ic: {use_rank: true, min_abs_ic: 0.0}
        thresholds: {strong_buy: 0.90, buy: 0.70, sell: 0.30, strong_sell: 0.10}
        buy_verdicts:     ["buy", "strong_buy"]
        sell_verdicts:    ["sell", "strong_sell"]
        refresh_verdicts: ["strong_buy"]
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
        mask:
          enabled: false

  mask_on:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector:
          type: lasso
          lasso: {alpha: 0.001, max_iter: 1000, tol: 1.0e-6}
        weighter:
          type: ic
          ic: {use_rank: true, min_abs_ic: 0.0}
        thresholds: {strong_buy: 0.90, buy: 0.70, sell: 0.30, strong_sell: 0.10}
        buy_verdicts:     ["buy", "strong_buy"]
        sell_verdicts:    ["sell", "strong_sell"]
        refresh_verdicts: ["strong_buy"]
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
        mask:
          enabled: true
          min_listing_days: 0
