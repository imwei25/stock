# D3b: D3 re-run on the FULL universe (no ab_pool gating).
# Portfolio universe = training universe = full ~4350-stock pool_data.
# Goal: confirm Sharpe weighter result from D3 (237 stocks) holds at scale.
# Run: .venv/Scripts/python.exe -m stockpool portfolio-ab \
#        --config docs/improvement_loop/configs/D3b_sharpe_full.yaml --workers 6
base_config: ../../../config.yaml
use_ab_pool: false                # ← full pool, not 237-stock ab_pool

arms:
  weighter_ic:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector:
          type: lasso
          lasso: {alpha: 0.001, max_iter: 1000, tol: 1.0e-6}
        weighter:
          type: ic
          ic: {use_rank: true, min_abs_ic: 0.0}
        thresholds: {strong_buy: 0.90, buy: 0.70, sell: 0.30, strong_sell: 0.10}
        buy_verdicts:     ["buy", "strong_buy"]
        sell_verdicts:    ["sell", "strong_sell"]
        refresh_verdicts: ["strong_buy"]
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false

  weighter_sharpe:
    strategy:
      name: ml_factor
      ml_factor:
        factors_file: reports/selection.json
        horizon: 3
        train_window: 250
        min_train_samples: 60
        refit_every: 20
        panel_mode: pooled
        training_universe: all
        selector:
          type: lasso
          lasso: {alpha: 0.001, max_iter: 1000, tol: 1.0e-6}
        weighter:
          type: sharpe
          sharpe:
            quantile: 0.2
            min_stocks_per_day: 10
            min_valid_days: 5
            min_abs_sharpe: 0.0
        thresholds: {strong_buy: 0.90, buy: 0.70, sell: 0.30, strong_sell: 0.10}
        buy_verdicts:     ["buy", "strong_buy"]
        sell_verdicts:    ["sell", "strong_sell"]
        refresh_verdicts: ["strong_buy"]
        preprocess:
          winsorize: [0.01, 0.99]
          zscore: true
          industry_neutralize: false
